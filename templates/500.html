{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>500 — Server Error | AquaSmart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  <style>
    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: 'Space Grotesk', sans-serif;
    }
    .error-wrap { text-align: center; max-width: 480px; width: 100%; }
    .error-code {
      font-family: 'Syne', sans-serif;
      font-size: 120px;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #ef4444, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .error-title {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 10px;
    }
    .error-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-home {
      padding: 12px 28px;
      background: var(--accent);
      color: #0a1628;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 800;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .15s;
    }
    .btn-home:hover { opacity: .85; }
    .btn-back {
      padding: 12px 28px;
      background: var(--surface2);
      color: var(--muted);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: all .15s;
    }
    .btn-back:hover { color: var(--text); border-color: var(--accent2); }
    .pulse-icon {
      font-size: 48px;
      display: inline-block;
      animation: pulse 2s ease-in-out infinite;
      margin-bottom: 20px;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1);    opacity: 1; }
      50%       { transform: scale(1.15); opacity: .7; }
    }
    .info-box {
      background: rgba(239,68,68,.06);
      border: 1px solid rgba(239,68,68,.2);
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 28px;
      text-align: left;
    }
  </style>
</head>
<body>
<div class="error-wrap">
  <div class="pulse-icon">⚙️</div>
  <div class="error-code">500</div>
  <div class="error-title">Something Went Wrong</div>
  <p class="error-desc">
    Server-এ একটি সমস্যা হয়েছে। আমরা ইতিমধ্যে জানি এবং ঠিক করার চেষ্টা করছি।
    কিছুক্ষণ পর আবার চেষ্টা করুন।
  </p>
  <div class="info-box">
    💡 সমস্যা চলতে থাকলে page refresh করুন অথবা কিছুক্ষণ পর আসুন।
  </div>
  <div class="error-actions">
    <a href="/" class="btn-home">🏠 Go to Dashboard</a>
    <a href="javascript:location.reload()" class="btn-back">↺ Refresh Page</a>
  </div>
</div>
</body>
</html>

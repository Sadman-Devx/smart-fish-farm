{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Offline — AquaSmart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  <style>
    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }
    .offline-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,.4);
    }
    .offline-icon {
      font-size: 64px;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .7; transform: scale(0.95); }
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 10px;
    }
    p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .btn-retry {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--accent);
      color: #0a1628;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 800;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      transition: opacity .15s;
      text-decoration: none;
    }
    .btn-retry:hover { opacity: .85; }

    .cached-pages {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      text-align: left;
    }
    .cached-pages h3 {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 12px;
    }
    .cached-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      background: var(--surface2);
      margin-bottom: 6px;
      text-decoration: none;
      color: var(--text);
      font-size: 13px;
      transition: background .15s;
    }
    .cached-link:hover { background: var(--surface3); }
    .cached-link .icon { font-size: 16px; flex-shrink: 0; }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
      padding: 8px 16px;
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.2);
      border-radius: 20px;
      font-size: 12px;
      color: var(--danger);
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--danger);
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: .3; }
    }
    .status-bar.online {
      background: rgba(16,185,129,.08);
      border-color: rgba(16,185,129,.2);
      color: var(--success);
    }
    .status-bar.online .status-dot {
      background: var(--success);
      animation: none;
    }
  </style>
</head>
<body>

<div class="offline-card">

  <div class="offline-icon">📡</div>

  <div class="status-bar" id="statusBar">
    <div class="status-dot"></div>
    <span id="statusText">No internet connection</span>
  </div>

  <h1>You're Offline</h1>
  <p>
    AquaSmart can't connect to the server right now.<br>
    Some pages may still be available from cache.
  </p>

  <button class="btn-retry" onclick="retryConnection()">
    🔄 Retry Connection
  </button>

  <div class="cached-pages">
    <h3>Available Offline</h3>
    <a href="/" class="cached-link">
      <span class="icon">⬡</span> Dashboard
    </a>
    <a href="/ponds/" class="cached-link">
      <span class="icon">◯</span> Ponds
    </a>
    <a href="/alerts/" class="cached-link">
      <span class="icon">🚨</span> Alerts
    </a>
    <a href="/harvests/" class="cached-link">
      <span class="icon">🎣</span> Harvests
    </a>
  </div>

</div>

<script>
  // Auto-detect when back online
  function updateStatus() {
    var bar  = document.getElementById('statusBar');
    var text = document.getElementById('statusText');
    if (navigator.onLine) {
      bar.className  = 'status-bar online';
      text.textContent = 'Connection restored — reloading…';
      setTimeout(function() { location.href = '/'; }, 1500);
    } else {
      bar.className  = 'status-bar';
      text.textContent = 'No internet connection';
    }
  }

  function retryConnection() {
    if (navigator.onLine) {
      location.href = '/';
    } else {
      var btn = document.querySelector('.btn-retry');
      btn.textContent = '⏳ Still offline…';
      setTimeout(function() { btn.innerHTML = '🔄 Retry Connection'; }, 2000);
    }
  }

  window.addEventListener('online',  updateStatus);
  window.addEventListener('offline', updateStatus);
  updateStatus();
</script>
</body>
</html>
